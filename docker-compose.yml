version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: millisec_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    networks:
      public_net:
        ipv4_address: 172.20.0.10
      private_net:
        ipv4_address: 10.0.0.10
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: millisec_frontend
    networks:
      public_net:
        ipv4_address: 172.20.0.20
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: millisec_backend
    environment:
      - DATABASE_URL=postgresql://millisec_user:millisec_password@db:5432/millisec_db
      - SECRET_KEY=millisec_super_secret_key_2024
      - SPLUNK_HEC_URL=https://16.16.127.3:8088/services/collector/event
      - SPLUNK_HEC_TOKEN=edca2ff0-885c-4a6c-972a-a9d6b03a05cd
    depends_on:
      - db
    networks:
      private_net:
        ipv4_address: 10.0.0.20
    restart: unless-stopped

  db:
    build: ./db
    container_name: millisec_db
    environment:
      - POSTGRES_USER=millisec_user
      - POSTGRES_PASSWORD=millisec_password
      - POSTGRES_DB=millisec_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      private_net:
        ipv4_address: 10.0.0.30
    restart: unless-stopped

networks:
  public_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
  private_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.0.0/16

volumes:
  postgres_data:
