user nginx;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # ==========================================================
    # 1. REAL IP AYARLARI (AWS və Docker üçün)
    # ==========================================================
    # AWS VPC daxili şəbəkəsini etibarlı sayırıq
    set_real_ip_from  10.0.0.0/16; 
    # Docker-in daxili şəbəkəsini etibarlı sayırıq
    set_real_ip_from  172.17.0.0/16;
    set_real_ip_from  172.18.0.0/16;

    # Real IP-ni X-Forwarded-For başlığından götür
    real_ip_header    X-Forwarded-For;
    # Əgər zəncirdə bir neçə proxy varsa, ən kənardakı public IP-ni tap
    real_ip_recursive on;


    # ==========================================================
    # 2. LOG FORMATI
    # (Yuxarıdakı ayarlardan sonra $remote_addr artıq real IP olacaq)
    # ==========================================================
    log_format honeypot_log '$remote_addr - $remote_user [$time_local] '
                            '"$request" $status $body_bytes_sent '
                            '"$http_referer" "$http_user_agent" '
                            'redirect="$honeypot_redirect"';

    # 3. DDoS Qorunması Zonası
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # 4. Şübhəli URI Map
    map $request_uri $honeypot_redirect {
        default                 0;
        ~*/wp-login\.php            1;
        ~*/wp-admin                 1;
        ~*/wp-config\.php           1;
        ~*/xmlrpc\.php              1;
        ~*/admin                    1;
        ~*/phpmyadmin               1;
        ~*\.env$                    1;
        ~*\.git                     1;
        ~*/shell                    1;
        ~*/cmd                      1;
        ~*\.sql$                    1;
        ~*\.bak$                    1;
        ~*/.well-known/acme         0;
    }

    # 5. Bad User-Agent Map
    map $http_user_agent $bad_agent {
        default                     0;
        ~*sqlmap 1; ~*nikto 1; ~*nmap 1; ~*masscan 1;
        ~*python-requests 1; ~*curl/7 1; "" 1;
    }

    # 6. Konfiqurasiya fayllarını qoşuruq
    include /etc/nginx/conf.d/*.conf;
}
