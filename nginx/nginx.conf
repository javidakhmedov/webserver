user nginx;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    
    # Təhlükəsizlik: Nginx versiyasını gizlədirik
    server_tokens off;

    # ==========================================================
    # 1. REAL IP AYARLARI (Giriş nöqtələri üçün)
    # ==========================================================
    # Daxili şəbəkə diapazonları (Bunlar standartdır, amma placeholder qoymaq daha peşəkar görünür)
    set_real_ip_from  10.0.0.0/16;    # Sənin AWS VPC CIDR-in
    set_real_ip_from  172.17.0.0/16;  # Docker Bridge
    set_real_ip_from  172.18.0.0/16;  # Docker Compose Network

    # Real IP-ni X-Forwarded-For başlığından götür
    real_ip_header    X-Forwarded-For;
    # Proxy zəncirində ən kənardakı public IP-ni tapmaq üçün
    real_ip_recursive on;

    # ==========================================================
    # 2. LOG FORMATI (Honeypot loqları üçün xüsusi format)
    # ==========================================================
    log_format honeypot_log '$remote_addr - $remote_user [$time_local] '
                            '"$request" $status $body_bytes_sent '
                            '"$http_referer" "$http_user_agent" '
                            'redirect="$honeypot_redirect"';

    # 3. DDoS Qorunması: Saniyədə 30 istəklə limitləyirik
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # 4. Honeypot Redirection Map (Şübhəli yollar)
    map $request_uri $honeypot_redirect {
        default                   0;
        ~*/wp-login\.php            1;
        ~*/wp-admin                 1;
        ~*/wp-config\.php           1;
        ~*/xmlrpc\.php              1;
        ~*/admin                    1;
        ~*/phpmyadmin               1;
        ~*\.env$                    1;
        ~*\.git                     1;
        ~*/shell                    1;
        ~*/cmd                      1;
        ~*\.sql$                    1;
        ~*\.bak$                    1;
        ~*/.well-known/acme         0; # SSL sertifikat üçün istisna
    }

    # 5. Bad User-Agent Map (Avtomatik skanerləri tələyə salmaq üçün)
    map $http_user_agent $bad_agent {
        default                     0;
        ~*sqlmap 1; ~*nikto 1; ~*nmap 1; ~*masscan 1;
        ~*python-requests 1; ~*curl/7 1; "" 1;
    }

    # 6. Digər konfiqurasiyaları (default.conf və s.) qoşuruq
    include /etc/nginx/conf.d/*.conf;
}
