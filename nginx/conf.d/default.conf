# =============================================
# UPSTREAM-LƏR
# =============================================
upstream tpot_honeypot {
    server 100.53.132.98:80;
    keepalive 32;
}

upstream backend_api {
    server millisec_backend:8000;
    keepalive 32;
}

# =============================================
# ƏSAS HTTPS SERVERİ (YENİLƏNMİŞ)
# =============================================
server {
    listen 443 ssl;
    http2 on;
    server_name millisecportal.site 13.49.127.4;

    # SSL Ayarları
    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Loq faylları
    access_log /var/log/nginx/honeypot_redirects.log honeypot_log;
    error_log  /var/log/nginx/error.log warn;

    # CLICKJACKING QORUMASI
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Content-Security-Policy "frame-ancestors 'self';" always;

    root /usr/share/nginx/html;
    index index.html;

    # A) HONEYPOT REDIRECTION (WP Trap)
    location ~* (wp-login\.php|wp-admin|wp-config|xmlrpc|\.env|\.git|phpmyadmin|/admin|/shell|/cmd|\.sql|\.bak) {
        proxy_pass http://tpot_honeypot;
        # Real IP-ni Honeypot-a ötürürük
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
    }

    # B) BAD USER-AGENT TRAP
    if ($bad_agent = 1) {
        rewrite ^ /honeypot-trap last;
    }

    location /honeypot-trap {
        internal;
        proxy_pass http://tpot_honeypot/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # C) API MAGİSTRALI (ƏN VACİB HİSSƏ)
    location /api/ {
        proxy_pass http://backend_api;
        
        # Bu 4 sətir Backend-in real IP-ni görməsini təmin edir
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 60s;
    }

    # D) STATİK FAYLLAR
    location ~* \.(html|jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2)$ {
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Content-Security-Policy "frame-ancestors 'self';" always;
        try_files $uri =404;
        access_log off;
    }

    # E) NORMAL TRAFİK
    location / {
        # Əgər Honeypot-a yönləndirmə varsa, IP-ni ora da ötür
        if ($honeypot_redirect = 1) {
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://tpot_honeypot;
        }

        limit_req zone=api_limit burst=20 nodelay;
        try_files $uri $uri/ /index.html;
    }
}
