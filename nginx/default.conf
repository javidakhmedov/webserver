# =============================================
# UPSTREAM-LƏR
# =============================================
upstream tpot_honeypot {
    server 100.53.132.98:80;
    keepalive 32;
}

upstream backend_api {
    server millisec_backend:8000;
    keepalive 32;
}

# =============================================
# HTTP → HTTPS REDIRECT
# =============================================
server {
    listen 80;
    server_name millisecportal.site;
    return 301 https://$host$request_uri;
}

# =============================================
# ƏSAS HTTPS SERVERİ
# =============================================
server {
    listen 443 ssl;
    http2 on;
    server_name millisecportal.site;

    # Faylların olduğu qovluq (Bura çox vacibdir!)
    root /usr/share/nginx/html;
    index index.html;

    # SSL sertifikatları
    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Loq faylları
    access_log /var/log/nginx/honeypot_redirects.log honeypot_log;
    error_log  /var/log/nginx/error.log warn;

    # A) HONEYPOT REDIRECTION (WP Trap)
    location ~* (wp-login\.php|wp-admin|wp-config|xmlrpc|\.env|\.git|phpmyadmin|/admin|/shell|/cmd|\.sql|\.bak) {
        proxy_pass http://tpot_honeypot;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # B) BAD USER-AGENT TRAP
    if ($bad_agent = 1) {
        rewrite ^ /honeypot-trap last;
    }

    location /honeypot-trap {
        internal;
        proxy_pass http://tpot_honeypot/;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # C) API MAGİSTRALI (Qeydiyyat/Login bura gəlir)
    location /api/ {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # D) STATİK FAYLLAR (Şəkillər, Dashboard, Index)
    # Nginx əvvəlcə faylı diskdə (root) axtaracaq
    location ~* \.(html|jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2)$ {
        try_files $uri =404;
        access_log off;
    }

    # E) NORMAL TRAFİK
    location / {
        if ($honeypot_redirect = 1) {
            proxy_pass http://tpot_honeypot;
        }

        limit_req zone=api_limit burst=20 nodelay;

        # Dashboard-un görünməsi üçün ən kritik sətir:
        try_files $uri $uri/ /index.html;
    }
}
