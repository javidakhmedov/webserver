# =============================================
# UPSTREAM-LƏR
# =============================================
upstream tpot_honeypot {
    # Real IP gizlədildi
    server <HONEYPOT_INTERNAL_IP>:80;
    keepalive 32;
}

upstream backend_api {
    server millisec_backend:8000;
    keepalive 32;
}

# =============================================
# ƏSAS HTTPS SERVERİ
# =============================================
server {
    listen 443 ssl;
    http2 on;
    # Real domain və IP placeholder ilə əvəz olundu
    server_name yourdomain.com <YOUR_PUBLIC_IP>;

    # SSL Ayarları (Fayl yolları standart qaldı)
    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Loq faylları
    access_log /var/log/nginx/honeypot_redirects.log honeypot_log;
    error_log  /var/log/nginx/error.log warn;

    # TƏHLÜKƏSİZLİK HEADER-LƏRİ
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Content-Security-Policy "frame-ancestors 'self';" always;
    add_header X-Content-Type-Options "nosniff" always; # Elave edildi

    root /usr/share/nginx/html;
    index index.html;

    # A) HONEYPOT REDIRECTION (Tələ bölməsi)
    location ~* (wp-login\.php|wp-admin|wp-config|xmlrpc|\.env|\.git|phpmyadmin|/admin|/shell|/cmd|\.sql|\.bak) {
        proxy_pass http://tpot_honeypot;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
    }

    # B) API MAGİSTRALI
    location /api/ {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # C) NORMAL TRAFİK VƏ RATE LIMITING
    location / {
        limit_req zone=api_limit burst=20 nodelay;
        try_files $uri $uri/ /index.html;
    }
}
